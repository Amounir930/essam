<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير التفصيلية | Essam OS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="reports-body">
    <div id="app">
        <!-- Premium Header Area -->
        <header class="main-header">
            <div class="header-top">
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
                <h1><i class="fas fa-chart-pie"></i> مركز التقارير الذكي</h1>
            </div>

            <!-- Dashboard Summaries in Header -->
            <div class="f-summary-grid">
                <div class="f-card-premium income">
                    <span class="f-label">إجمالي التحصيل</span>
                    <span class="f-value" id="fTotalCollection">0.00</span>
                </div>
                <div class="f-card-premium supply">
                    <span class="f-label">إجمالي التوريد</span>
                    <span class="f-value" id="fTotalSupply">0.00</span>
                </div>
                <div class="f-card-premium amazon">
                    <span class="f-label">صافي المطابقة</span>
                    <span class="f-value" id="fTotalAmazon">0.00</span>
                </div>
            </div>
        </header>

        <main class="reports-container-pro">
            <!-- Intelligent Control Bar -->
            <div class="smart-toolbar">
                <div class="toolbar-group search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTerm" placeholder="ابحث في أي يوم أو مبلغ...">
                </div>
                <div class="toolbar-group">
                    <select id="sortBy">
                        <option value="date-desc">الأحدث أولاً</option>
                        <option value="date-asc">الأقدم أولاً</option>
                        <option value="amount-desc">الأعلى مبلغاً</option>
                        <option value="amount-asc">الأقل مبلغاً</option>
                    </select>
                </div>
                <div class="toolbar-group date-filters">
                    <input type="date" id="filterFrom">
                    <span class="sep">/</span>
                    <input type="date" id="filterTo">
                </div>
                <div class="toolbar-actions">
                    <button class="btn-icon" id="btnEssamReport" title="كشف حساب عصام"><i class="fas fa-user-tie"></i></button>
                    <button class="btn-icon" id="btnAmazonReport" title="مطابقة أمازون"><i class="fas fa-box-open"></i></button>
                </div>
            </div>

            <!-- Professional Ledger Header -->
            <div class="ledger-header">
                <div class="l-col">التاريخ واليوم</div>
                <div class="l-col">التحصيل (وارد)</div>
                <div class="l-col">التوريد (منصرف)</div>
                <div class="l-col">الصافي المعلق</div>
                <div class="l-col actions">إدارة</div>
            </div>

            <!-- Ledger Body -->
            <div class="ledger-body" id="detailedReportsList">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري مزامنة البيانات المالية...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
