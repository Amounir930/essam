<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير التفصيلية | Essam OS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="reports-page">
    <div id="app">
        <header>
            <div class="logo">
                <i class="fas fa-chart-bar"></i>
                <h1>التقارير التفصيلية</h1>
            </div>
            <a href="index.html" class="btn-text"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </header>

        <main>
            <section class="reports">
                <div class="section-header">
                    <h2>سجل الأيام التفصيلي</h2>
                </div>
                <div class="records-container" id="detailedReportsList">
                    <div class="no-data">جاري تحميل البيانات...</div>
                </div>
            </section>
        </main>

        <!-- Modals (Needed for Edit functionality) -->
        <div id="recordModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>تعديل سجل</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="recordForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>التاريخ</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label>بداية اليوم (تلقائي)</label>
                            <input type="number" id="startBalance" readonly>
                        </div>
                        <div class="form-group">
                            <label>التحصيل</label>
                            <input type="number" id="collection" value="0">
                        </div>
                        <div class="form-group">
                            <label>التوريد</label>
                            <input type="number" id="supply" value="0">
                        </div>
                        <div class="form-group">
                            <label>تحويل كاش</label>
                            <input type="number" id="cash" value="0">
                        </div>
                        <div class="form-group">
                            <label>اوردرات انستا</label>
                            <input type="number" id="instaShop" value="0">
                        </div>
                        <div class="form-group">
                            <label>المشتريات</label>
                            <input type="number" id="purchases" value="0">
                        </div>
                        <div class="form-group">
                            <label>مصروفات المحل</label>
                            <input type="number" id="expenses" value="0">
                        </div>
                        <div class="form-group">
                            <label>مصروفات عصام</label>
                            <input type="number" id="essam" value="0">
                        </div>
                        <div class="form-group">
                            <label>المبلغ الفعلي</label>
                            <input type="number" id="actualAmount" value="0">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-submit">حفظ التعديلات</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
