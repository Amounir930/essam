<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essam Financial OS | Enterprise</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-halved"></i>
                <span>Commander OS</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active"><i class="fas fa-grid-2"></i> لوحة التحكم</button>
                <button class="nav-item" onclick="openReportModal('amazon')"><i class="fas fa-truck-loading"></i> توريد أمازون</button>
                <button class="nav-item" onclick="openReportModal('essam')"><i class="fas fa-user-gear"></i> مصروفات عصام</button>
            </nav>
            <div class="sidebar-actions">
                <button id="themeToggle" class="btn-icon-text">
                    <i class="fas fa-circle-half-stroke"></i>
                    <span>الوضع الليلي</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="app-main">
            <header class="app-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTerm" placeholder="بحث سريع في السجلات...">
                </div>
                <div class="header-actions">
                    <button class="btn-sync" id="btnSyncGithub"><i class="fas fa-cloud-arrow-up"></i> مزامنة</button>
                    <button class="btn-primary" onclick="openAddModal()"><i class="fas fa-plus-circle"></i> سجل جديد</button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card income">
                    <label>التحصيل</label>
                    <h2 id="fTotalCollection">0.00</h2>
                </div>
                <div class="stat-card expense">
                    <label>التوريد</label>
                    <h2 id="fTotalSupply">0.00</h2>
                </div>
                <div class="stat-card balance">
                    <label>الصافي</label>
                    <h2 id="fTotalAmazon">0.00</h2>
                </div>
            </div>

            <div class="ledger-container">
                <div class="ledger-header">
                    <h2>العمليات المالية</h2>
                    <select id="sortBy" class="select-minimal">
                        <option value="date-desc">الأحدث أولاً</option>
                        <option value="date-asc">الأقدم أولاً</option>
                    </select>
                </div>
                <div class="ledger-scroll">
                    <table class="data-table" id="mainTable">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th class="val">التحصيل</th>
                                <th class="val">التوريد</th>
                                <th class="val">الصافي</th>
                                <th>الحالة</th>
                                <th class="actions">إدارة</th>
                            </tr>
                        </thead>
                        <tbody id="detailedReportsList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="recordModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>إدارة البيانات المالية</h3>
                <button class="close-btn" onclick="closeAddModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="recordForm" class="modal-form">
                <input type="hidden" id="recordIndex">
                <div class="grid-2">
                    <div class="field"><label><i class="fas fa-calendar-day"></i> التاريخ</label><input type="date" id="date" required></div>
                    <div class="field"><label><i class="fas fa-vault"></i> الفعلي بالخزنة</label><input type="number" id="actualAmount" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label><i class="fas fa-plus"></i> التحصيل</label><input type="number" id="collection" value="0"></div>
                    <div class="field"><label><i class="fas fa-plus"></i> انستا</label><input type="number" id="instaShop" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label><i class="fas fa-minus"></i> التوريد</label><input type="number" id="supply" value="0"></div>
                    <div class="field"><label><i class="fas fa-minus"></i> الكاش</label><input type="number" id="cash" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label><i class="fas fa-minus"></i> المشتريات</label><input type="number" id="purchases" value="0"></div>
                    <div class="field"><label><i class="fas fa-minus"></i> مصروف المحل</label><input type="number" id="expenses" value="0"></div>
                </div>
                <div class="field full"><label><i class="fas fa-user-tag"></i> مصروف عصام</label><input type="number" id="essam" value="0"></div>
                
                <div class="field full">
                    <label><i class="fas fa-paperclip"></i> أرشفة الفاتورة</label>
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-file-arrow-up"></i>
                        <span>اسحب الملف هنا أو اضغط للرفع</span>
                        <input type="file" id="invoiceFile" accept="image/*,.pdf" hidden>
                        <input type="hidden" id="invoiceUrl">
                    </div>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>
                
                <div class="modal-footer" style="padding-top: 20px;">
                    <button type="submit" class="btn-primary-full">تأكيد وحفظ السجل</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal-overlay">
        <div class="modal-card" style="width: 400px;">
            <div class="modal-header">
                <h3 id="repTitle">إعداد التقرير</h3>
                <button class="close-btn" onclick="closeReportModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-form">
                <div class="field" style="margin-bottom: 16px;"><label>من تاريخ</label><input type="date" id="repFrom"></div>
                <div class="field" style="margin-bottom: 24px;"><label>إلى تاريخ</label><input type="date" id="repTo"></div>
                <div class="grid-2">
                    <button onclick="exportReport('excel')" class="btn-sync" style="justify-content: center;"><i class="fas fa-file-excel"></i> Excel</button>
                    <button onclick="exportReport('pdf')" class="btn-primary" style="justify-content: center;"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-card" style="width: 350px;">
            <div class="modal-form" style="text-align: center;">
                <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--danger); margin-bottom: 16px;"></i>
                <h3 style="margin-bottom: 8px;">تأكيد الحذف</h3>
                <p style="color: var(--text-med); margin-bottom: 24px;">هل أنت متأكد من حذف هذا السجل نهائياً؟ لا يمكن التراجع عن هذا الإجراء.</p>
                <div class="grid-2">
                    <button onclick="closeConfirmModal()" class="btn-sync">إلغاء</button>
                    <button id="confirmBtn" class="btn-primary" style="background: var(--danger);">حذف السجل</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Print Template (Hidden) -->
    <div id="printTemplate" class="print-only"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
