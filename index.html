<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essam Financial OS | Enterprise</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="app-sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-halved"></i>
                <span>Commander OS</span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active"><i class="fas fa-grid-2"></i> لوحة التحكم</button>
                <button class="nav-item" onclick="openReportModal('amazon')"><i class="fas fa-truck-loading"></i> توريد أمازون</button>
                <button class="nav-item" onclick="openReportModal('essam')"><i class="fas fa-user-gear"></i> مصروفات عصام</button>
            </nav>
            <div class="sidebar-actions">
                <button id="themeToggle" class="btn-icon-text">
                    <i class="fas fa-circle-half-stroke"></i>
                    <span>الوضع الليلي</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="app-main">
            <header class="app-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTerm" placeholder="بحث سريع في السجلات...">
                </div>
                <div class="header-actions">
                    <button class="btn-sync" id="btnSyncGithub"><i class="fas fa-cloud-arrow-up"></i> مزامنة</button>
                    <button class="btn-primary" onclick="openAddModal()"><i class="fas fa-plus-circle"></i> سجل جديد</button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card income">
                    <label>التحصيل</label>
                    <h2 id="fTotalCollection">0.00</h2>
                </div>
                <div class="stat-card expense">
                    <label>التوريد</label>
                    <h2 id="fTotalSupply">0.00</h2>
                </div>
                <div class="stat-card balance">
                    <label>الصافي</label>
                    <h2 id="fTotalAmazon">0.00</h2>
                </div>
            </div>

            <div class="ledger-container">
                <div class="ledger-header">
                    <h2>العمليات المالية</h2>
                    <select id="sortBy" class="select-minimal">
                        <option value="date-desc">الأحدث أولاً</option>
                        <option value="date-asc">الأقدم أولاً</option>
                    </select>
                </div>
                <div class="ledger-scroll">
                    <table class="data-table" id="mainTable">
                        <thead>
                            <tr>
                                <th>التاريخ</th>
                                <th class="val">التحصيل</th>
                                <th class="val">التوريد</th>
                                <th class="val">الصافي</th>
                                <th>الحالة</th>
                                <th class="actions">إدارة</th>
                            </tr>
                        </thead>
                        <tbody id="detailedReportsList"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="recordModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>إدارة البيانات المالية</h3>
                <button onclick="closeAddModal()">&times;</button>
            </div>
            <form id="recordForm" class="modal-form">
                <input type="hidden" id="recordIndex">
                <div class="grid-2">
                    <div class="field"><label>التاريخ</label><input type="date" id="date" required></div>
                    <div class="field"><label>الفعلي بالخزنة</label><input type="number" id="actualAmount" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>التحصيل (+)</label><input type="number" id="collection" value="0"></div>
                    <div class="field"><label>انستا (+)</label><input type="number" id="instaShop" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>التوريد (-)</label><input type="number" id="supply" value="0"></div>
                    <div class="field"><label>الكاش (-)</label><input type="number" id="cash" value="0"></div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>المشتريات (-)</label><input type="number" id="purchases" value="0"></div>
                    <div class="field"><label>مصروف المحل (-)</label><input type="number" id="expenses" value="0"></div>
                </div>
                <div class="field full"><label>مصروف عصام (-)</label><input type="number" id="essam" value="0"></div>
                
                <div class="field full">
                    <label>أرشفة الفاتورة</label>
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-file-arrow-up"></i>
                        <span>اسحب الملف هنا أو اضغط للرفع</span>
                        <input type="file" id="invoiceFile" accept="image/*,.pdf" hidden>
                        <input type="hidden" id="invoiceUrl">
                    </div>
                    <div id="uploadStatus" class="upload-status"></div>
                </div>
                
                <div class="modal-footer">
                    <button type="submit" class="btn-primary-full">تأكيد وحفظ السجل</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Print Template (Hidden) -->
    <div id="printTemplate" class="print-only"></div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
